## agent-fox configuration
## Generated by agent-fox 3.0.0
## https://github.com/agent-fox-dev/agent-fox
##
## Uncomment and edit values to customize.

[orchestrator]
## Maximum parallel sessions (1-8, default: 2)
parallel = 5
## Shell command to run after each coder session (default: "")
quality_gate = "make check"
## Maximum USD spend per session, 0 = unlimited (default: 8.0)
max_budget_usd = 8.0
## Sync interval in task groups (>=0, default: 5)
# sync_interval = 5
## Hot-load specs between sessions (default: true)
# hot_load = true
## Maximum retries per task group (>=0, default: 2)
# max_retries = 2
## Session timeout in minutes (>=1, default: 30)
# session_timeout = 30
## Delay between sessions in seconds (>=0, default: 3)
# inter_session_delay = 3
## Maximum cost limit (not set by default)
## max_cost =
## Maximum number of sessions (not set by default)
## max_sessions =
## Maximum number of runs to retain in the audit log (default: 20)
# audit_retention_runs = 20
## Stop the run when this fraction of nodes are blocked (0.0-1.0). None = disabled. (not set by default)
## max_blocked_fraction =
## Quality gate timeout in seconds (default: 300)
# quality_gate_timeout = 300
## Maximum number of prior facts included in the causal extraction prompt. When total non-superseded facts exceed this limit, prior facts are ranked by embedding similarity to the new facts and only the top N are included. (default: 200)
# causal_context_limit = 200
## Seconds between watch polls when --watch is active. Values below 10 are clamped to 10. (>=10, default: 60)
# watch_interval = 60

[models]
## Model tier for coding tasks (default: "ADVANCED")
coding = "ADVANCED"
## Model tier for memory extraction (default: "SIMPLE")
# memory_extraction = "SIMPLE"
## Fallback model ID when primary is unavailable (default: "claude-sonnet-4-6")
# fallback_model = "claude-sonnet-4-6"

[archetypes]
## Enable coder archetype (default: true)
coder = true
## Enable reviewer archetype (replaces skeptic, oracle, auditor) (default: true)
reviewer = true
## Enable verifier archetype (default: true)
verifier = true
## Per-archetype model overrides (default: {})
# models = {}
## Per-archetype command allowlists (default: {})
# allowlists = {}
## Per-archetype maximum turn limits (default: {})
# max_turns = {}
## Per-archetype extended thinking configuration (default: {})
# thinking = {}
## Unified per-archetype configuration tables. TOML: [archetypes.overrides.<name>]. Takes precedence over models/max_turns/thinking/allowlists dicts. (default: {})
# overrides = {}
## Custom archetype configurations keyed by archetype name. TOML: [archetypes.custom.<name>]. Requirements: 99-REQ-4.2 (default: {})
# custom = {}

# [archetypes.reviewer_config]
## Finding count to block merge for pre-review mode (>=0, default: 3)
# pre_review_block_threshold = 3
## Drift count to block for drift-review mode (None = advisory only) (>=1, not set by default)
## drift_review_block_threshold =
## Minimum TS entries to trigger audit-review injection (>=1, default: 5)
# audit_min_ts_entries = 5
## Maximum audit-review/coder retry iterations (>=0, default: 2)
# audit_max_retries = 2

[archetypes.instances]
## Number of verifier instances (max clamped to 1) (1, default: 1)
verifier = 1

[platform]
type = "github"
## Issue tracker URL (defaults from type) (default: "")
# url = ""

# [security]
## Allowed bash commands (not set by default)
## bash_allowlist =
## Additional allowed bash commands (default: [])
# bash_allowlist_extend = []

## For all configuration options, see https://github.com/agent-fox-dev/agent-fox/blob/main/docs/config-reference.md
